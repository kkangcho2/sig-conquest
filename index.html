<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>SIG CONQUEST V2 — 시작</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="assets/css/common.css"/>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;}
    .startBox{
      background:var(--bg-panel);border:1px solid var(--border);
      border-radius:20px;padding:40px 50px;text-align:center;
      max-width:600px;width:100%;
    }
    .logo{font-size:36px;font-weight:900;color:#00eaff;letter-spacing:3px;
      text-shadow:0 0 20px rgba(0,234,255,.4);}
    .sub{font-size:14px;color:var(--text-muted);margin:6px 0 30px;}
    .field{margin:16px 0;text-align:left;}
    .field label{display:block;font-size:14px;font-weight:700;margin-bottom:6px;color:var(--text-muted);}
    .player-count{display:flex;align-items:center;gap:12px;justify-content:center;}
    .pc-btn{
      width:44px;height:44px;border-radius:12px;font-size:22px;font-weight:900;
      background:rgba(32,168,255,.2);border:2px solid var(--primary);color:white;cursor:pointer;
    }
    .pc-btn:hover{background:rgba(32,168,255,.4);}
    .pc-num{font-size:36px;font-weight:900;color:var(--warning);min-width:50px;}
    .name-inputs{display:flex;flex-direction:column;gap:6px;margin-top:12px;}
    .name-row{display:flex;align-items:center;gap:8px;}
    .name-dot{width:20px;height:20px;border-radius:50%;flex-shrink:0;}
    .name-row input{flex:1;}
    .btns{margin-top:30px;display:flex;flex-direction:column;gap:10px;}
    .links{margin-top:24px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
    .links a{
      color:var(--primary);text-decoration:none;font-size:13px;font-weight:700;
      padding:6px 14px;border:1px solid var(--border);border-radius:8px;
    }
    .links a:hover{background:rgba(32,168,255,.1);}
  </style>
</head>
<body>
<div class="startBox">
  <div class="logo">★ SIG CONQUEST ★</div>
  <div class="sub">V40 · 36칸 가로형 · 최대 15인 · 방송 오버레이</div>

  <div class="field">
    <label>인원 수</label>
    <div class="player-count">
      <button class="pc-btn" id="pcMinus">−</button>
      <div class="pc-num" id="pcNum">4</div>
      <button class="pc-btn" id="pcPlus">+</button>
    </div>
  </div>

  <div class="field">
    <label>시작 금액</label>
    <div class="row" style="gap:8px;justify-content:center;">
      <button class="btn" data-money="30000">3만</button>
      <button class="btn" data-money="50000">5만</button>
      <button class="btn" data-money="100000">10만</button>
      <button class="btn" data-money="200000">20만</button>
      <button class="btn" data-money="500000">50만</button>
    </div>
    <input type="number" id="moneyInput" value="50000" style="width:200px;margin-top:8px;text-align:center;font-size:18px;font-weight:900;"/>
  </div>

  <div class="field">
    <label>플레이어 이름</label>
    <div class="name-inputs" id="nameInputs"></div>
  </div>

  <div class="btns">
    <button class="btn-huge primary" id="newGameBtn">🎮 새 게임 시작</button>
    <button class="btn-huge" id="continueBtn" style="display:none;">▶ 이어하기</button>
  </div>

  <div class="links">
    <a href="overlay.html" target="_blank">📺 오버레이 열기</a>
    <a href="console.html" target="_blank">🎮 관리 콘솔 열기</a>
  </div>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/storage.js"></script>
<script src="assets/js/engine.js"></script>
<script>
  const $ = id => document.getElementById(id);
  let count = 4;

  function updateNames() {
    const box = $('nameInputs');
    box.innerHTML = '';
    for (let i = 0; i < count; i++) {
      const row = document.createElement('div');
      row.className = 'name-row';
      row.innerHTML = `
        <div class="name-dot" style="background:${CFG.COLORS[i]}"></div>
        <input type="text" class="nameField" placeholder="${CFG.DEFAULT_NAMES[i]}" value=""/>`;
      box.appendChild(row);
    }
  }

  function updateCount() {
    $('pcNum').textContent = count;
    updateNames();
  }

  $('pcMinus').onclick = () => { count = Math.max(CFG.MIN_PLAYERS, count - 1); updateCount(); };
  $('pcPlus').onclick  = () => { count = Math.min(CFG.MAX_PLAYERS, count + 1); updateCount(); };

  document.querySelectorAll('[data-money]').forEach(btn => {
    btn.onclick = () => $('moneyInput').value = btn.dataset.money;
  });

  // 이어하기
  const saved = SigStorage.load();
  if (saved && saved.version >= 40) {
    $('continueBtn').style.display = 'block';
    $('continueBtn').onclick = () => window.open('console.html', '_blank');
  }

  // 시그 자동 배정 (index.html에서도 사용)
  async function autoAssignSig(state) {
    const pool = await idbGetAll();
    if (!pool.length) return;
    const sigTiles = state.tiles.filter(t => t.type === 'SIG').sort((a,b) => a.id - b.id);
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    const sorted = shuffled.sort((a,b) => {
      const extractAmt = name => { const m = (name||'').replace(/,/g,'').match(/\d+/); return m ? parseInt(m[0],10) : 0; };
      return extractAmt(a.name) - extractAmt(b.name);
    });
    const N = sigTiles.length;
    let picked;
    if (sorted.length <= N) { picked = [...sorted]; }
    else {
      picked = [];
      const cs = sorted.length / N;
      for (let i = 0; i < N; i++) {
        const s = Math.floor(i * cs), e = Math.min(Math.floor((i+1) * cs), sorted.length);
        picked.push(sorted.slice(s, e)[Math.floor(Math.random() * (e - s))]);
      }
    }
    const assign = {};
    const extractAmt = name => { const m = (name||'').replace(/,/g,'').match(/\d+/); return m ? parseInt(m[0],10) : 0; };
    const extractName = name => { const p = (name||'').split('_'); return p.length > 1 ? p.slice(1).join('_') : name; };
    sigTiles.forEach((tile, i) => {
      if (!picked[i]) return;
      assign[tile.id] = picked[i].uid;
      const amt = extractAmt(picked[i].name);
      if (amt > 0) tile.price = amt;
      const sn = extractName(picked[i].name);
      if (sn) tile.name = sn;
    });
    saveAssign(assign);
  }

  // 새 게임
  $('newGameBtn').onclick = async () => {
    const money = parseInt($('moneyInput').value, 10) || 50000;
    const names = [...document.querySelectorAll('.nameField')].map(inp => inp.value.trim());
    const state = SigEngine.createGame(count, money, names);
    // 시그 이미지 자동 배정
    await autoAssignSig(state);
    SigStorage.save(state);
    window.open('overlay.html', 'overlay', 'width=1920,height=1080');
    window.open('console.html', 'console');
  };

  updateCount();
</script>
</body>
</html>
